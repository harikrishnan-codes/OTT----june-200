<!DOCTYPE html>
<html lang="en">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - Page Not Found</title>

  <style>
    body {
      font-family: Poppins, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background: #f5f7ff;
      text-align: center;
    }

    h1 {
      font-size: 60px;
      color: #000;
    }

    p {
      font-size: 18px;
    }

    .btns {
      margin-top: 20px;
      display: flex;
      gap: 15px;
      justify-content: center;
      flex-wrap: wrap;
    }

    a, button {
      text-decoration: none;
      color: #fff;
      background: #e66b10;
      padding: 10px 20px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-size: 14px;
    }

    button {
      background: #2b3440;
    }

    /* =========================
       TABLET (768px)
    ========================= */
    @media (max-width: 768px) {
      h1 {
        font-size: 48px;
      }

      p {
        font-size: 20px;
      }

      a, button {
        padding: 10px 22px;
        font-size: 15px;
      }
    }

    /* =========================
       MOBILE (480px better)
    ========================= */
    @media (max-width: 480px) {
      h1 {
        font-size: 38px;
      }

      p {
        font-size: 18px;
      }

      .btns {
        flex-direction: column;
      }

      a, button {
        width: 100%;
      }
    }
  </style>
</head>

<body>
  <div>
    <h1>404</h1>
    <p>Page not found</p>

    <div class="btns">
      <!-- Go Home -->
      <a href="index.html">Go Home</a>

      <!-- Go Back -->
      <button onclick="goBack()">Go Back</button>
    </div>
  </div>

  <script>
    function goBack() {
      if (document.referrer !== "") {
        window.history.back();
      } else {
        // fallback if no history
        window.location.href = "index.html";
      }
    }
  </script>
</body>
</html>
